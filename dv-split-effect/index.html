<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#101010" />
  <title>DV 分屏特效生成器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <div>
        <p class="eyebrow">LOCAL · PRIVATE · FAST</p>
        <h1>DV 分屏特效生成器</h1>
        <p class="sub">上传一张/两张图片或视频，自动生成上下分屏、REC 取景框、暖色电影感和开场模糊。</p>
      </div>
      <span class="badge">素材仅在本机处理</span>
    </header>

    <section class="grid">
      <aside class="panel controls">
        <label class="upload">
          <span>上半屏素材</span>
          <input id="topInput" type="file" accept="image/*,video/*" />
          <b id="topName">选择图片或视频</b>
        </label>
        <label class="upload">
          <span>下半屏素材</span>
          <input id="bottomInput" type="file" accept="image/*,video/*" />
          <b id="bottomName">未选择时复用上半屏</b>
        </label>

        <div class="control-row">
          <label>暖色强度 <output id="warmOut">35</output></label>
          <input id="warm" type="range" min="0" max="100" value="35" />
        </div>
        <div class="control-row">
          <label>颗粒强度 <output id="grainOut">14</output></label>
          <input id="grain" type="range" min="0" max="45" value="14" />
        </div>
        <div class="control-row">
          <label>暗角强度 <output id="vignetteOut">28</output></label>
          <input id="vignette" type="range" min="0" max="70" value="28" />
        </div>
        <div class="control-row inline">
          <label><input id="mirrorTop" type="checkbox" /> 上屏镜像</label>
          <label><input id="mirrorBottom" type="checkbox" /> 下屏镜像</label>
        </div>
        <div class="control-row inline">
          <label><input id="recOverlay" type="checkbox" checked /> REC 界面</label>
          <label><input id="introBlur" type="checkbox" checked /> 开场模糊</label>
        </div>

        <div class="actions">
          <button id="playBtn" class="primary">预览 / 播放</button>
          <button id="imageBtn">导出封面图</button>
          <button id="recordBtn">导出 6 秒 MP4（苹果兼容）</button>
        </div>

        <div id="exportProgress" class="export-progress" hidden>
          <div class="progress-head">
            <strong id="progressTitle">准备导出</strong>
            <span id="progressPercent">0%</span>
          </div>
          <div
            id="progressTrack"
            class="progress-track"
            role="progressbar"
            aria-label="视频导出进度"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <i id="progressBar"></i>
          </div>
          <p id="progressDetail">请保持页面在前台，不要锁屏。</p>
        </div>

        <div class="mp4-note">
          <strong>真正的 H.264 MP4</strong>
          <p>首次导出需加载约 31 MB 的转码核心，之后浏览器通常会缓存。素材和视频均只在本机处理。</p>
        </div>
        <p id="status" class="status" role="status" aria-live="polite">等待上传素材</p>
      </aside>

      <section class="panel stage-wrap">
        <canvas id="canvas" width="720" height="1280"></canvas>
        <div class="hint">输出比例 9:16 · 720×1280</div>
      </section>
    </section>
  </main>
  <script src="vendor/ffmpeg/ffmpeg.js"></script>
  <script src="app.js"></script>
</body>
</html>
